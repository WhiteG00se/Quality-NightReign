; Storm Control - Configuration File

[time]
; Default storm speed (1.0 = normal speed)
default=1.0

; Minimum and Maximum speed allowed
min=0.0
max=100.0

; Speed change per key press
step=1.0

; Minutes to jump per key press (forward/backward)
time_step=60

[keys]
; Hotkeys (Use CTRL, SHIFT, ALT, plus UP, DOWN, LEFT, RIGHT, HOME, etc.)
increase_speed=CTRL+UP
decrease_speed=CTRL+DOWN
reset_speed=CTRL+HOME
stop_storm=CTRL+END
max_speed=CTRL+PGUP
time_forward=CTRL+RIGHT
time_backward=CTRL+LEFT

; Profile keys
switch_profile=CTRL+F8
next_profile=CTRL+F8
prev_profile=CTRL+F7
clear_profile=CTRL+F6

[overlay]
; Show the on-screen display?
enabled=true

; Stay visible permanently? (false = only shows when changing speed)
always_show=false

; Text size (Default: 1.50)
font_scale=1.50

; Position (0:Top-Left, 1:Top-Right, 2:Bottom-Left, 3:Bottom-Right)
position=1

; Distance from screen edges
margin=10.0

[logging]
; Save log info to log.txt?
to_file=true

; Advanced logging (disabled by default)
;to_debugger=false
;to_console=false
; Log levels: error, warn, info, debug, trace
;min_level=info

[profile]
; Enable external profile override (profiles/<name>.ini)
enabled=false

; Name of the profile file in the 'profiles' folder
name=Example

to_debugger=false

