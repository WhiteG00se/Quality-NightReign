; StormControl example profile (shareable)
; Copy this file, rename it, and set name=<YourName> in config.ini [profile]
; To activate a profile, edit config.ini:
;   [profile]
;   enabled=true
;   name=Default
;
; How values are applied:
; - Each value is a multiplier applied on TOP of the base storm speed from config.ini [time].default
;   Example: base=1.0x, phase multiplier=2.0 → effective 2.0x. Base=0.5x, phase=2.0 → effective 1.0x.
; - 1.0 = normal speed; <1.0 slows; >1.0 speeds up; 0.0 stops storm progression in that phase.
; - Day transitions are detected automatically via memory; Day 3 has no storm (ignored by logic).
;
; Phase timing reference (game clock):
; - PhaseStart (Phase 0): 07:00 → 12:30
; - FirstCircle (Phase 1): 12:30 → 16:10
; - BetweenWaves (Phase 2): 16:10 → 20:25
; - SecondCircle (Phase 3): 20:25 → 23:59

[profile]
; Optional: overlay on/off when this profile is active
OverlayEnabled=true


; Day 1
; Phase 0 (07:00-12:30) multiplier on Day 1
PhaseStartSpeedDay1=1.0
; Phase 1 (12:30-16:10) multiplier on Day 1
PhaseFirstCircleSpeedDay1=1.0
; Phase 2 (16:10-20:25) multiplier on Day 1
PhaseBetweenWavesSpeedDay1=1.0
; Phase 3 (20:25-23:59) multiplier on Day 1
PhaseSecondCircleSpeedDay1=1.0

; Day 2
; Phase 0 (07:00-12:30) multiplier on Day 2
PhaseStartSpeedDay2=1.0
; Phase 1 (12:30-16:10) multiplier on Day 2
PhaseFirstCircleSpeedDay2=1.0
; Phase 2 (16:10-20:25) multiplier on Day 2
PhaseBetweenWavesSpeedDay2=1.0
; Phase 3 (20:25-23:59) multiplier on Day 2
PhaseSecondCircleSpeedDay2=1.0


